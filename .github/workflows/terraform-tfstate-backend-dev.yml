name: terraform-tfstate-backend-dev

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action to execute"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform:
    name: Bootstrap Terraform Backend (dev)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: infra/terraform/bootstrap-tfstate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Enforce main branch for apply/destroy
        if: ${{ inputs.terraform_action != 'plan' && github.ref != 'refs/heads/main' }}
        run: |
          echo "Apply and destroy are only allowed from main branch."
          exit 1

      - name: Terraform Plan
        if: ${{ inputs.terraform_action == 'plan' }}
        run: terraform plan -input=false -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform Apply
        if: ${{ inputs.terraform_action == 'apply' && github.ref == 'refs/heads/main' }}
        run: terraform apply -auto-approve -input=false -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform Destroy
        if: ${{ inputs.terraform_action == 'destroy' && github.ref == 'refs/heads/main' }}
        run: terraform destroy -auto-approve -input=false -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"
